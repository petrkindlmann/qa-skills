name: Validate Skills

on:
  push:
    paths:
      - 'skills/**'
      - 'evals/**'
      - 'scripts/**'
      - 'skills_index.json'
      - 'README.md'
      - '.github/workflows/validate-skills.yml'
  pull_request:
    paths:
      - 'skills/**'
      - 'evals/**'
      - 'scripts/**'
      - 'skills_index.json'
      - 'README.md'
      - '.github/workflows/validate-skills.yml'
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Structural validation: required sections, category whitelist, name/dir match,
      # references exist + no orphans, Related-Skills resolution, eval-spec presence,
      # README/index count sync, line caps.
      - name: Validate skills
        run: python3 scripts/validate_skills.py

      # Static eval proxy: each skill's content must teach every checkable
      # expected_pattern and recommend no anti_pattern. Free; no model calls.
      - name: Static evals
        run: python3 scripts/run_evals.py --static --all --min-pass-rate 90

      # The index is a generated artifact — fail if it drifted from skills/.
      - name: Index in sync
        run: python3 scripts/build_index.py --check

      # The bundled injection detector must keep passing its own selftest.
      - name: Injection detector selftest
        run: python3 skills/ai-system-testing/scripts/detect_injection.py --selftest
